<div class="process-container">
    <p class="eyebrow">Our process</p>
    <h2 style="margin: 4px 0px 20px;">Simple Process. Superior Results.</h2>
    <div class="steps-container">
        @for (item of steps; track item.id) {
        <div class="step">
            <div class="step-id">
                {{ item.id + 1 }}
            </div>
            <h3 class="step-title">{{ item.title }}</h3>
            <p style="font-size: .75rem;">{{ item.description }}</p>
        </div>
        }
    </div>
</div>
