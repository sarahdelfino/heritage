<app-navbar></app-navbar>
<router-outlet></router-outlet>
<div class="footer-container">
    <img class="logo" src="HSB-nobg.png">
    <div class="footer-section-container">
        @for (section of footer; track $index) {
        <div class="footer-section">
            <p class="footer-title">{{ section.title }}</p>
            @for (link of section.links; track $index) {
            <div class="footer-text">
                <p [routerLink]="link?.link" (click)="footerButtonClicked(`footer_${$index}_clicked`)">{{ link.name }}
                </p>
            </div>
            }
        </div>
        }
    </div>
</div>
