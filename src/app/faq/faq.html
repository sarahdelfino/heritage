@for (q of faq; track $index) {
  <mat-expansion-panel  (click)="faqClicked(`faq_${$index}_clicked`)">
    <mat-expansion-panel-header>
      <mat-panel-title>{{ q.title }}</mat-panel-title>
    </mat-expansion-panel-header>

    <p>{{ q.description }}</p>

    @if (q.url) {
      <a [href]="q.url" target="_blank">
        @if (q.image) {
          <img [src]="q.image" alt="">
        }
      </a>
    }
  </mat-expansion-panel>
}
