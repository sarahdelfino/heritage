<div class="carousel-container">
        <p-carousel class="gold-carousel" [value]="images()" [numVisible]="1" [numScroll]="1" circular="true"
                autoplayInterval="3000">
                <ng-template let-img #item>
                        <a href="/floorplans.pdf" target="_blank">
                                <img id="{{ img.id + '_' + type}}" [src]="img.image">
                        </a>
                </ng-template>
        </p-carousel>
</div>
